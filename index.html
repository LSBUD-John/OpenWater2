<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LSBUD Open Water Report</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link relg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<style>amily:Arial,sans-serif;
}

header{
    background:#002D5B;
    color:white;
    padding:15px;
}

#map{
    height:70vh;
}

.panel{
    padding:15px;
}

button{
    padding:10px;
    margin-right:5px;
}

#results{
    margin-top:15px;
    padding:10px;
    border:1px solid #ccc;
}

</style>

</head>

<body>

<header>
<h1>LSBUD Open Water Report</h1>
</header>

<div class="panel">

<button onclick="analyseSite()">
Analyse Site
</button>

<div id="results">
Draw a polygon.
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<scriptaflet.draw.js"></script>

turf/turf@6/turf.min.js"></script>

<script>

const map =
L.map("map").setView(
[52.4862,-1.8904],
11
);

L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

const drawnItems =
new L.FeatureGroup();

map.addLayer(drawnItems);

let currentLayer = null;

const drawControl =
new L.Control.Draw({

draw:{
polygon:true,
rectangle:true,
polyline:false,
circle:false,
marker:false,
circlemarker:false
},

edit:{
featureGroup:drawnItems
}
});

map.addControl(drawControl);

map.on(
L.Draw.Event.CREATED,
function(e){

drawnItems.clearLayers();

currentLayer =
e.layer;

drawnItems.addLayer(
currentLayer
);

}
);

function analyseSite(){

if(!currentLayer){

alert(
"Draw a polygon first."
);

return;
}

const geojson =
currentLayer.toGeoJSON();

const areaSqm =
turf.area(
geojson
);

const areaHa =
areaSqm / 10000;

const areaKm2 =
areaSqm / 1000000;

const price =
Math.max(
4.95,
areaKm2 * 2
);

document.getElementById(
"results"
).innerHTML =

`
<h3>Site Analysis</h3>

<p>
Area:
${areaSqm.toFixed(0)} m²
</p>

<p>
Area:
${areaHa.toFixed(2)} ha
</p>

<p>
Area:
${areaKm2.toFixed(3)} km²
</p>

<p>
Suggested Report Price:
£${price.toFixed(2)}
</p>
`;

}

</script>

</body>
</html>
