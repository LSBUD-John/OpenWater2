<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LSBUD Open Water Report</title>

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
      href="https

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{
    background:#002D5B;
    color:white;
    padding:15px;
}

header h1{
    margin:0;
}

header p{
    margin:5px 0 0 0;
}

.container{
    display:flex;
    height:calc(100vh - 90px);
}

.sidebar{
    width:360px;
    background:white;
    padding:20px;
    overflow:auto;
    border-right:1px solid #ddd;
}

#map{
    flex:1;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
}

button{
    display:block;
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    background:#002D5B;
    color:white;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    background:#004480;
}

.card{
    margin-top:15px;
    padding:15px;
    background:#f8f8f8;
    border-radius:4px;
    border:1px solid #ddd;
}

.good{
    border-left:5px solid green;
}

.warning{
    border-left:5px solid orange;
}

.info{
    font-size:12px;
    color:#666;
}

.metric{
    font-size:22px;
    font-weight:bold;
    color:#002D5B;
}

</style>

</head>

<body>

<header>

<h1>LSBUD Open Water Report</h1>

<p>
Draw a site boundary or paste WKT.
</p>

</header>

<div class="container">

<div class="sidebar">

<h2>Site Search</h2>

<textarea
id="wktInput"
placeholder="Paste WKT polygon here..."></textarea>

<button onclick="loadWKT()">
Load WKT
</button>

<button onclick="clearMap()">
Clear Map
</button>

<button onclick="analyseSite()">
Analyse Site
</button>

<div id="results">

<div class="card">

Ready.

</div>

</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.let.js

<script src="https://unpkg.com/leaflet-draw@1flet.draw.js

<script srckg.com/@turf/turf@6/turf.min.js

<script>

const map =
L.map("map")
.setView(
[52.4862,-1.8904],
11
);

L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

const drawnItems =
new L.FeatureGroup();

map.addLayer(drawnItems);

let currentLayer = null;

const drawControl =
new L.Control.Draw({

draw:{
polygon:true,
rectangle:true,
polyline:false,
circle:false,
marker:false,
circlemarker:false
},

edit:{
featureGroup:drawnItems
}

});

map.addControl(drawControl);

map.on(
L.Draw.Event.CREATED,
function(e){

drawnItems.clearLayers();

currentLayer =
e.layer;

drawnItems.addLayer(
currentLayer
);

showMessage(
"Site drawn successfully."
);

}
);

function showMessage(message){

document.getElementById(
"results"
).innerHTML =

`
<div class="card">
${message}
</div>
`;

}

function clearMap(){

drawnItems.clearLayers();

currentLayer = null;

document.getElementById(
"wktInput"
).value = "";

showMessage("Map cleared.");

}

function loadWKT(){

try{

const wkt =
document
.getElementById(
"wktInput"
)
.value
.trim();

if(!wkt){

alert(
"Please paste WKT."
);

return;

}

const coordsText =
wkt.match(
/\(\((.*)\)\)/
)[1];

const coords =
coordsText
.split(",")
.map(c=>{

const p =
c.trim().split(/\s+/);

return [

parseFloat(
p[1]
),

parseFloat(
p[0]
)

];

});

drawnItems.clearLayers();

currentLayer =
L.polygon(coords);

drawnItems.addLayer(
currentLayer
);

map.fitBounds(
currentLayer.getBounds()
);

showMessage(
"WKT loaded."
);

}
catch(err){

alert(
"Unable to parse WKT."
);

}

}

function analyseSite(){

if(!currentLayer){

alert(
"Draw a site or load WKT first."
);

return;

}

const geojson =
currentLayer
.toGeoJSON();

const areaSqm =
turf.area(
geojson
);

const areaHa =
areaSqm / 10000;

const areaKm2 =
areaSqm / 1000000;

const price =
Math.max(
4.95,
areaKm2 * 2
);

document.getElementById(
"results"
).innerHTML =

`
<div class="card good">

<h3>
Site Analysis
</h3>

<p>
Area (m²)
</p>

<div class="metric">
${areaSqm.toFixed(0)}
</div>

<p>
Area (ha)
</p>

<div class="metric">
${areaHa.toFixed(2)}
</div>

<p>
Area (km²)
</p>

<div class="metric">
${areaKm2.toFixed(3)}
</div>

<hr>

<p>
Indicative Report Price
</p>

<div class="metric">
£${price.toFixed(2)}
</div>

<p class="info">

Stage 1 Complete.

Next stage will add:

• OpenStreetMap water search

• Distance calculations

• Risk categorisation

• PDF reports

• Stripe checkout

</p>

</div>
`;

}

</script>

</body>
</html>
